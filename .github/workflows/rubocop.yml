name: RuboCop
on:
  - push

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install RuboCop
        run: |
          version=$(grep -m1 "^    rubocop (" Gemfile.lock | sed "s/.*(\(.*\))/\1/")
          gem install rubocop -v "$version" --no-document
      - name: RuboCop
        run: rubocop
